name: Build Web App

on:
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/user-app/package-lock.json

    - name: Install dependencies
      working-directory: ./apps/user-app
      run: npm ci

    - name: Build web app
      working-directory: ./apps/user-app
      run: npx expo export --platform web

    - name: Upload web build artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: apps/user-app/dist/
        retention-days: 30

    - name: Deploy to GitHub Pages
      if: false
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./apps/user-app/dist
        cname: negocios-do-bairro.com # Opcional: substitua pelo seu domínio

    - name: Create Release
      if: false
      uses: softprops/action-gh-release@v1
      with:
        tag_name: web-v${{ github.run_number }}
        name: Web Release v${{ github.run_number }}
        body: |
          🌐 Nova versão web do aplicativo Negócios do Bairro
          
          🚀 Aplicação web disponível em: https://negocios-do-bairro.com
          
          Alterações incluídas nesta versão:
          ${{ github.event.head_commit.message }}
        files: |
          apps/user-app/dist/**/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
