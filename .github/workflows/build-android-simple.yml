name: Build Android APK (Simple)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'apps/user-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.20.2'
        cache: 'npm'
        cache-dependency-path: apps/user-app/package-lock.json

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      working-directory: ./apps/user-app
      run: npm ci

    - name: Install EAS CLI
      run: npm install -g @expo/cli@latest

    - name: Create Expo account token file
      run: |
        mkdir -p ~/.expo
        echo "${{ secrets.EXPO_TOKEN }}" > ~/.expo/token

    - name: Prebuild Android
      working-directory: ./apps/user-app
      run: npx expo prebuild --platform android --clean

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Make gradlew executable
      run: chmod +x ./apps/user-app/android/gradlew

    - name: Build Android APK (Release)
      working-directory: ./apps/user-app/android
      run: ./gradlew assembleRelease

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: apps/user-app/android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      continue-on-error: true
      uses: softprops/action-gh-release@v1
      with:
        tag_name: debug-v${{ github.run_number }}
        name: Debug Release v${{ github.run_number }}
        body: |
          🚀 Nova versão de teste do aplicativo Negócios do Bairro
          
          📱 APK Android (Release) disponível para download
          ⚠️  Esta é uma versão de teste não assinada
          
          Alterações incluídas nesta versão:
          ${{ github.event.head_commit.message }}
        files: apps/user-app/android/app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
