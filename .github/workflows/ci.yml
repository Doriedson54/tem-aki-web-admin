name: Continuous Integration

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'apps/user-app/**'
      - 'backend/**'
      - 'web-admin/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'apps/user-app/**'
      - 'backend/**'
      - 'web-admin/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.20.2'
        cache: 'npm'
        cache-dependency-path: apps/user-app/package-lock.json

    - name: Install dependencies
      working-directory: ./apps/user-app
      run: npm ci

    - name: Run linting
      run: |
        echo "🔍 Running ESLint..."
        npx eslint . --ext .js,.jsx,.ts,.tsx || echo "ESLint not configured"
      working-directory: ./apps/user-app

    - name: Run tests
      run: |
        echo "🧪 Running tests..."
        npm test || echo "No tests configured"
      working-directory: ./apps/user-app

    - name: Check Expo configuration
      run: |
        echo "📱 Checking Expo configuration..."
        npx expo doctor || echo "expo doctor failed"
      working-directory: ./apps/user-app

    - name: Validate app.json
      run: |
        echo "✅ Validating app.json..."
        node -e "console.log('app.json is valid JSON:', JSON.parse(require('fs').readFileSync('app.json', 'utf8')))"
      working-directory: ./apps/user-app

    - name: Check for security vulnerabilities
      run: |
        echo "🔒 Checking for security vulnerabilities..."
        npm audit --audit-level=moderate || echo "npm audit failed"
      working-directory: ./apps/user-app

  build-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.20.2'
        cache: 'npm'
        cache-dependency-path: apps/user-app/package-lock.json

    - name: Install dependencies
      working-directory: ./apps/user-app
      run: npm ci

    - name: Test web build
      run: |
        echo "🌐 Testing web build..."
        npx expo export --platform web || echo "expo export (web) failed"
      working-directory: ./apps/user-app

    - name: Test prebuild
      run: |
        echo "📱 Testing prebuild..."
        npx expo prebuild --no-install || echo "expo prebuild failed"
      working-directory: ./apps/user-app

  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.20.2'
        cache: 'npm'

    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Run backend tests
      working-directory: ./backend
      run: |
        echo "🔧 Testing backend..."
        npm test || echo "No backend tests configured"

    - name: Check backend linting
      working-directory: ./backend
      run: |
        echo "🔍 Checking backend linting..."
        npx eslint . || echo "ESLint not configured for backend"

  admin-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.20.2'
        cache: 'npm'

    - name: Install admin dependencies
      working-directory: ./web-admin
      run: npm ci

    - name: Test admin build
      working-directory: ./web-admin
      run: |
        echo "👨‍💼 Testing admin build..."
        npm run build || echo "No build script for admin"

    - name: Run admin tests
      working-directory: ./web-admin
      run: |
        echo "🧪 Testing admin..."
        npm test || echo "No admin tests configured"
