name: Build Android APK

on:
  push:
    tags: [ 'v*' ]
    paths:
      - 'apps/user-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/user-app/package-lock.json

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      working-directory: ./apps/user-app
      run: npm ci

    - name: Install EAS CLI
      run: npm install -g @expo/cli@latest eas-cli@latest

    - name: Create Expo account token file
      run: |
        mkdir -p ~/.expo
        echo "${{ secrets.EXPO_TOKEN }}" > ~/.expo/token

    - name: Prebuild Android
      working-directory: ./apps/user-app
      run: npx expo prebuild --platform android --clean

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Make gradlew executable
      run: chmod +x ./apps/user-app/android/gradlew

    - name: Build Android APK
      working-directory: ./apps/user-app/android
      run: ./gradlew assembleRelease

    - name: Sign APK
      if: success()
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: apps/user-app/android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: apps/user-app/android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      continue-on-error: true
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          🚀 Nova versão do aplicativo Negócios do Bairro
          
          📱 APK Android disponível para download
          
          Alterações incluídas nesta versão:
          ${{ github.event.head_commit.message }}
        files: apps/user-app/android/app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
