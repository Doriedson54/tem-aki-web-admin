name: Build React Native App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
        - android
        - ios
        - all

env:
  NODE_VERSION: '18'
  EXPO_CLI_VERSION: 'latest'

jobs:
  build-android:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' || github.event.inputs.platform == '' }}
    runs-on: ubuntu-latest
    
    steps:
    - name: 🏗 Setup repo
      uses: actions/checkout@v4
      
    - name: 🏗 Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        
    - name: 🏗 Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 🏗 Setup Expo CLI
      run: |
        npm install -g @expo/cli@latest
        npm install -g eas-cli@latest
        
    - name: 📦 Install dependencies
      run: |
        npm ci
        
    - name: 🔧 Prebuild Android
      run: |
        npx expo prebuild --platform android --clear
        
    - name: 🚀 Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease
        
    - name: 📱 Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30

  notify-success:
    needs: [build-android]
    if: success()
    runs-on: ubuntu-latest
    
    steps:
    - name: 🎉 Build Success Notification
      run: |
        echo "✅ APK gerado com sucesso!"
        echo "📱 Baixe o APK na aba Actions > Artifacts"
        echo "🔗 Link direto: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"