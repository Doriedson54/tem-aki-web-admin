name: Build React Native App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
        - android
        - ios
        - all
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
        - development
        - preview
        - production

env:
  NODE_VERSION: '18'
  EXPO_CLI_VERSION: 'latest'

jobs:
  build-android:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' || github.event.inputs.platform == '' }}
    runs-on: ubuntu-latest
    
    steps:
    - name: 🏗 Setup repo
      uses: actions/checkout@v4
      
    - name: 🏗 Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        
    - name: 🏗 Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 🏗 Setup Expo and EAS
      uses: expo/expo-github-action@v8
      with:
        expo-version: ${{ env.EXPO_CLI_VERSION }}
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}
        
    - name: 📦 Install dependencies
      run: |
        npm ci
        npx expo install --fix
        
    - name: 🔧 Setup EAS local builds
      run: |
        eas build:configure
        
    - name: 🚀 Build Android APK
      run: |
        PROFILE=${{ github.event.inputs.profile || 'preview' }}
        eas build --platform android --profile $PROFILE --local --output ./build-output/
        
    - name: 📱 Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-app-${{ github.event.inputs.profile || 'preview' }}
        path: ./build-output/*.apk
        retention-days: 30
        
    - name: 📱 Upload Android AAB (if production)
      if: ${{ github.event.inputs.profile == 'production' }}
      uses: actions/upload-artifact@v4
      with:
        name: android-aab-production
        path: ./build-output/*.aab
        retention-days: 90

  build-ios:
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' || github.event.inputs.platform == '' }}
    runs-on: macos-latest
    
    steps:
    - name: 🏗 Setup repo
      uses: actions/checkout@v4
      
    - name: 🏗 Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        
    - name: 🏗 Setup Expo and EAS
      uses: expo/expo-github-action@v8
      with:
        expo-version: ${{ env.EXPO_CLI_VERSION }}
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}
        
    - name: 📦 Install dependencies
      run: |
        npm ci
        npx expo install --fix
        
    - name: 🔧 Setup EAS local builds
      run: |
        eas build:configure
        
    - name: 🍎 Build iOS IPA
      run: |
        PROFILE=${{ github.event.inputs.profile || 'preview' }}
        eas build --platform ios --profile $PROFILE --local --output ./build-output/
        
    - name: 📱 Upload iOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-${{ github.event.inputs.profile || 'preview' }}
        path: ./build-output/*.ipa
        retention-days: 30

  notify-success:
    needs: [build-android, build-ios]
    if: always() && (needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    runs-on: ubuntu-latest
    
    steps:
    - name: 🎉 Build Success Notification
      run: |
        echo "✅ Build completed successfully!"
        echo "📱 Download artifacts from the Actions tab"
        echo "🔗 Direct link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notify-failure:
    needs: [build-android, build-ios]
    if: always() && (needs.build-android.result == 'failure' || needs.build-ios.result == 'failure')
    runs-on: ubuntu-latest
    
    steps:
    - name: ❌ Build Failure Notification
      run: |
        echo "❌ Build failed!"
        echo "🔍 Check the logs for details"
        echo "🔗 Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"