version: '3.8'

services:
  # Aplicação Node.js
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: tem-aki-institucional
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./backups:/app/backups
    networks:
      - tem-aki-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Redis para cache e sessões
  redis:
    image: redis:7-alpine
    container_name: tem-aki-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-tem_aki_redis_2024}
    volumes:
      - redis_data:/data
    networks:
      - tem-aki-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # Nginx como proxy reverso
  nginx:
    image: nginx:alpine
    container_name: tem-aki-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
      - ./public:/var/www/public:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - tem-aki-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot para SSL automático
  certbot:
    image: certbot/certbot
    container_name: tem-aki-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@seu-dominio.com.br --agree-tos --no-eff-email -d seu-dominio.com.br -d www.seu-dominio.com.br
    depends_on:
      - nginx

  # Watchtower para atualizações automáticas
  watchtower:
    image: containrrr/watchtower
    container_name: tem-aki-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=false
    command: --interval 3600 --cleanup

  # Backup automático
  backup:
    image: alpine:latest
    container_name: tem-aki-backup
    restart: unless-stopped
    volumes:
      - ./uploads:/data/uploads:ro
      - ./logs:/data/logs:ro
      - ./backups:/backups
    environment:
      - BACKUP_CRON=0 2 * * *
      - BACKUP_RETENTION_DAYS=30
    command: |
      sh -c '
        apk add --no-cache dcron tar gzip
        echo "$$BACKUP_CRON cd /data && tar -czf /backups/backup_$$(date +%Y%m%d_%H%M%S).tar.gz uploads logs" | crontab -
        echo "0 3 * * * find /backups -name "backup_*.tar.gz" -mtime +$$BACKUP_RETENTION_DAYS -delete" | crontab -
        crond -f
      '

  # Monitoramento com Prometheus (opcional)
  prometheus:
    image: prom/prometheus:latest
    container_name: tem-aki-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - tem-aki-network
    profiles:
      - monitoring

  # Grafana para visualização (opcional)
  grafana:
    image: grafana/grafana:latest
    container_name: tem-aki-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - tem-aki-network
    profiles:
      - monitoring

volumes:
  redis_data:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  tem-aki-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16